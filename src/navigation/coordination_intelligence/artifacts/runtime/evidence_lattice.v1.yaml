schema_version: '1.0'
description: 'Deterministic evidence posture transitions. Applied after capability
  envelopes are normalized into PSM evidence domains.

  '
transitions:
- from: unknown
  to: partial
  true:
  - capability_produced_any_evidence_in_domain
- from: partial
  to: known
  true:
  - capability_produced_high_fidelity_evidence
  block_if:
  - blocking_nonempty
- from: known
  to: verified
  true:
  - verify_capability_success
  block_if:
  - degraded_nonempty_unless_playbook_allows
- from: verified
  to: regressed
  true:
  - verify_fail
  - blocking_new
  - audit_regression
- from: regressed
  to: verified
  true:
  - verify_success_after_fix
- from: known
  to: partial
  true:
  - evidence_stale_beyond_ttl
- from: verified
  to: known
  true:
  - material_context_change_without_verify
