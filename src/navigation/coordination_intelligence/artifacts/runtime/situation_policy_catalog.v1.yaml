schema_version: '1.0'
description: 'R12 Situation Policy Catalog — compile-time distilled engineering policies.
  Derived from the 150-state research corpus. Never matches leaf state IDs at runtime.
  Drives Engineering Investment, EQG priors, allow/forbid, and STOP bias.

  '
