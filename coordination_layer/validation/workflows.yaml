    expected_tools:
      - perception_session_start
      - perception_plan_component_search
      - perception_search_components
      - perception_select_component_foundation
      - perception_integrate_component
      - perception_verify
    forbidden_capabilities: [component_integrate_live]
    simulate_steps:
      - tool: perception_session_start
        ok: true
      - tool: perception_plan_component_search
        ok: true
      - tool: perception_search_components
        ok: true
