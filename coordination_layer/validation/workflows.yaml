schema_version: "1.0"
description: >
  Coordination Intelligence validation workflows. Each workflow defines the expected
  engineering sequence (capabilities + tools), cluster/playbook expectations, and
  success criteria. Used by run_coordination_validation.py — not runtime control flow.

workflows:
  - workflow_id: CVW-01
    title: Build landing page from Figma
    engineering_goal: Greenfield landing page aligned to Figma design source
    modules: [figma_intelligence, visual_browser_intelligence, design_snapshot_engine, design_sense_intelligence, consistency_intelligence, codebase_intelligence]
    expected_cluster_sequence:
      - cluster.design.figma_pipeline
      - cluster.design.review_and_snapshot
      - cluster.feature.data_ui
    expected_playbook_sequence:
      - discover_collect_cleanup.inspiration_resource
      - snapshot_review_consistency.design
      - observe_reason_act_verify.loop
    expected_capabilities:
      - figma_integration
      - browser_session_manage
      - browser_observe
      - design_snapshot
      - design_review
      - design_graph_manage
      - browser_verify
    expected_tools:
      - perception_session_start
      - perception_figma_connect
      - perception_figma_context
      - perception_navigate_and_observe
      - perception_build_design_snapshot
      - perception_design_review
      - perception_design_graph_refresh
      - perception_verify
    forbidden_early_capabilities: [seo_evidence_collect, component_search]
    simulate_steps:
      - tool: perception_session_start
        ok: true
      - tool: perception_figma_connect
        ok: true
      - tool: perception_figma_context
        ok: true
      - tool: perception_navigate_and_observe
        ok: true
      - tool: perception_build_design_snapshot
        ok: true
      - tool: perception_design_review
        ok: true
      - tool: perception_design_graph_refresh
        ok: true
      - tool: perception_verify
        ok: true
    success_criteria:
      final_cluster: cluster.design.review_and_snapshot
      playbook_complete_or: observe_reason_act_verify.loop
      max_unnecessary_tools: 2

  - workflow_id: CVW-02
    title: Build page from inspiration only
    engineering_goal: Design direction from inspiration without Figma
    modules: [inspiration_intelligence, resource_intelligence, visual_browser_intelligence, design_snapshot_engine]
    expected_cluster_sequence:
      - cluster.design.reference_gathering
      - cluster.feature.data_ui
    expected_playbook_sequence:
      - discover_collect_cleanup.inspiration_resource
      - observe_reason_act_verify.loop
    expected_capabilities:
      - browser_session_manage
      - inspiration_workflow
      - browser_observe
      - design_snapshot
      - browser_verify
    expected_tools:
      - perception_session_start
      - perception_inspiration_discover
      - perception_inspiration_collect
      - perception_inspiration_session_end
      - perception_navigate_and_observe
      - perception_build_design_snapshot
      - perception_verify
    forbidden_early_capabilities: [figma_integration, seo_evidence_collect]
    simulate_steps:
      - tool: perception_session_start
        ok: true
      - tool: perception_inspiration_discover
        ok: true
      - tool: perception_inspiration_collect
        ok: true
      - tool: perception_inspiration_session_end
        ok: true
      - tool: perception_navigate_and_observe
        ok: true
      - tool: perception_build_design_snapshot
        ok: true
      - tool: perception_verify
        ok: true
    success_criteria:
      final_cluster: cluster.feature.data_ui
      max_unnecessary_tools: 2

  - workflow_id: CVW-03
    title: Improve existing page
    engineering_goal: Iterative improvement on shipped page with regression guard
    modules: [visual_browser_intelligence, frontend_quality_intelligence, codebase_intelligence]
    expected_cluster_sequence:
      - cluster.discovery.bootstrap
      - cluster.debug.iteration_target
    expected_playbook_sequence:
      - observe_reason_act_verify.loop
    expected_capabilities:
      - browser_session_manage
      - browser_observe
      - browser_verify
      - browser_diff
    expected_tools:
      - perception_session_start
      - perception_navigate_and_observe
      - perception_observe
      - perception_verify
      - perception_diff
    simulate_steps:
      - tool: perception_session_start
        ok: true
      - tool: perception_navigate_and_observe
        ok: true
      - tool: perception_verify
        ok: false
      - tool: perception_observe
        ok: true
      - tool: perception_verify
        ok: true
      - tool: perception_diff
        ok: true
    recovery_expect:
      trigger: TR_VERIFY_FAIL
      then_capability: browser_observe
    success_criteria:
      governor_must_handle_verify_fail: true
      max_unnecessary_tools: 1

  - workflow_id: CVW-04
    title: Add new feature (form validation)
    engineering_goal: Ship validated form feature — invalid before valid
    modules: [design_workflow_intelligence, visual_browser_intelligence]
    expected_cluster_sequence:
      - cluster.feature.form_pipeline
    expected_playbook_sequence:
      - invalid_before_valid.form
    expected_capabilities:
      - browser_session_manage
      - form_probe
      - browser_verify
    expected_tools:
      - perception_session_start
      - perception_probe_form
      - perception_verify
      - perception_verify
    simulate_steps:
      - tool: perception_session_start
        ok: true
      - tool: perception_probe_form
        ok: true
      - tool: perception_verify
        ok: true
      - tool: perception_verify
        ok: true
    success_criteria:
      final_cluster: cluster.feature.form_pipeline
      playbook_complete: invalid_before_valid.form
      sequence_invalid_before_valid: true
      max_unnecessary_tools: 0
    live_eval_runner: run_mcp_eval_validation_form

