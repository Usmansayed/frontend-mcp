      blast_radius: low

  - capability_id: seo_evidence_collect
    display_name: Collect SEO evidence via module orchestrator
    tier: T1_global
    kind: collect
    requires:
      evidence:
        ui_runtime: { min_posture: known }
      artifacts: [repo_root]
      optional_artifacts: [scan_id, session_id]
      environment: []
    produces:
      evidence:
        seo: { posture: known }
      artifacts: []
    implements:
      - module_id: seo_intelligence
        priority: 1
        tools_ref: seo_evidence_collect
        module_internal:
          orchestrator_entry: true
          t2_namespace: seo
    risk:
      mcp_ready: true
      blast_radius: medium
    replan_triggers:
      on_degraded: [TR_DEGRADED_UPSTREAM]

  - capability_id: seo_graph_query
    display_name: Query persistent SEO graph (including audit diff)
    tier: T1_global
    kind: query
    requires:
      evidence:
        seo: { min_posture: partial }
      artifacts: []
      environment: []
    produces:
      evidence:
        seo: { posture: known }
      artifacts: []
    implements:
      - module_id: seo_intelligence
        priority: 1
