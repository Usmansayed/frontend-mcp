        tools_ref: form_probe
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: route_guards_probe
    display_name: Probe navigation and route guards
    tier: T1_global
    kind: probe
    requires:
      evidence: {}
      artifacts: [session_id]
      environment: [dev_server_reachable]
    produces:
