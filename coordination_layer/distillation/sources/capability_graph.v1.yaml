  - capability_id: quality_audit
    display_name: Run domain quality audit (Lighthouse path)
    tier: T1_global
    kind: verify
    requires:
      evidence:
        ui_runtime: { min_posture: known }
      artifacts: [session_id]
      environment: [dev_server_reachable]
    produces:
      evidence:
        quality: { posture: known }
      artifacts: [audit_id]
    implements:
      - module_id: frontend_quality_intelligence
        priority: 1
        tools_ref: quality_audit
        module_internal:
          t2_namespace: quality
          t2_capabilities: [a11y_audit, perf_audit, best_practices_audit, seo_audit, triad]
    parallel:
      parallelizable: true
      parallel_group: quality_triad
      mutex_with: [browser_verify]
    risk:
