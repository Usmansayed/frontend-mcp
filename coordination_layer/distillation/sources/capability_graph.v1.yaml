      blast_radius: low

  - capability_id: form_probe
    display_name: Probe form fields and validation rules
    tier: T1_global
    kind: probe
    requires:
      evidence: {}
      artifacts: [session_id]
      environment: [dev_server_reachable]
    produces:
      evidence:
        ui_runtime: { posture: partial }
      artifacts: []
    implements:
      - module_id: design_workflow_intelligence
