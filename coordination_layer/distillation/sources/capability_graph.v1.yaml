  - capability_id: resource_workflow
    display_name: Search, license-check, and bridge resources to UI
    tier: T1_global
    kind: collect
    requires:
      evidence: {}
      artifacts: []
      optional_artifacts: [scan_id, session_id]
      environment: []
    produces:
      evidence:
        assets: { posture: known }
      artifacts: []
    implements:
      - module_id: resource_intelligence
        priority: 1
        tools_ref: resource_workflow
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: figma_integration
    display_name: Connect Figma and load design context
    tier: T1_global
    kind: collect
    requires:
      evidence: {}
      artifacts: []
      environment: []
    produces:
      evidence:
        design_source: { posture: known }
      artifacts: []
    implements:
      - module_id: figma_intelligence
        priority: 1
        tools_ref: figma_integration
    risk:
      mcp_ready: true
      blast_radius: medium

  - capability_id: component_search_plan
    display_name: Plan component search when query is vague
    tier: T1_global
    kind: query
    requires:
      evidence: {}
      artifacts: [repo_root]
      environment: []
    produces:
      evidence: {}
      artifacts: []
    implements:
      - module_id: component_intelligence
        priority: 1
        tools_ref: component_search_plan
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: component_search
    display_name: Search component providers
    tier: T1_global
    kind: collect
    requires:
      evidence: {}
      artifacts: [repo_root]
      environment: []
    produces:
      evidence:
        assets: { posture: partial }
      artifacts: []
    implements:
      - module_id: component_intelligence
        priority: 1
        tools_ref: component_search
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: component_select
    display_name: Select best component via multi-contract consultation
    tier: T1_global
    kind: query
    requires:
      evidence:
        assets: { min_posture: partial }
      artifacts: [repo_root]
      environment: []
    produces:
      evidence: {}
      artifacts: []
    implements:
      - module_id: component_intelligence
        priority: 1
        tools_ref: component_select
        module_internal:
          parallel_consult: [framework_profile, codebase_context, design_review, design_consistency_assess, browser_observe]
    parallel:
      parallelizable: true
      parallel_group: component_selection_consult
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: component_integrate
    display_name: Integrate selected component (dry-run default)
    tier: T1_global
    kind: mutate
    requires:
      evidence:
        assets: { min_posture: partial }
      artifacts: [repo_root]
      environment: []
    produces:
      evidence:
        codebase: { posture: known }
      artifacts: []
    implements:
      - module_id: component_intelligence
        priority: 1
        tools_ref: component_integrate_dry_run
      - module_id: component_intelligence
        priority: 2
        tools_ref: component_integrate_live
        condition: live_install_explicitly_requested
    degradation:
      on_mcp_not_ready: substitute_dry_run
    risk:
      mutates_repo: true
      mcp_ready: false
      blast_radius: high
      mcp_ready_note: Live install scaffold only; dry-run is default path.
    replan_triggers:
      on_mcp_not_ready: [TR_MCP_NOT_READY]

edges:
  - from: browser_observe
    to: design_snapshot
    type: requires
    notes: snapshot needs scan_id

  - from: design_graph_manage
    to: design_consistency_audit
    type: requires
    condition: pdg_was_empty

  - from: seo_graph_query
    to: seo_evidence_collect
    type: supersedes
    condition: seo_graph_exists_and_fresh

  - from: component_integrate
    to: component_integrate
    type: fallback
    condition: live_unavailable_use_dry_run
    notes: Internal routing — dry-run when mcp_ready false

  - from: browser_verify
    to: browser_observe
    type: fallback
    condition: verify_fail_missing_scan

  - from: quality_audit
    to: browser_observe
    type: requires
    notes: stable page before audits

  - from: seo_evidence_collect
    to: browser_observe
    type: enhances
    notes: scan_id improves evidence quality

  - from: browser_observe
    to: browser_verify
    type: mutex
    notes: session-scoped during act phase

parallel_groups:
  bootstrap_probe:
    parallelizable: true
    capabilities: [environment_probe, framework_profile, codebase_context]
    join_policy: all_complete_before_next_step

  component_selection_consult:
    parallelizable: true
    capabilities: [component_select]
    join_policy: module_internal_parallel
    note: Consultation runs inside component module

  quality_triad:
    parallelizable: true
    capabilities: [quality_audit]
    join_policy: module_internal_parallel
    mutex_with: [browser_verify]

capability_module_index:
  visual_browser_intelligence:
    capabilities: [environment_probe, browser_session_manage, browser_observe, browser_act, browser_verify, browser_diff]
  framework_intelligence:
    capabilities: [framework_profile]
  codebase_intelligence:
    capabilities: [codebase_context]
  design_workflow_intelligence:
    capabilities: [form_probe, route_guards_probe, auth_gate, flow_describe, session_state_manage]
  design_snapshot_engine:
    capabilities: [design_snapshot]
  design_sense_intelligence:
    capabilities: [design_review]
  consistency_intelligence:
    capabilities: [design_graph_manage, design_consistency_audit, design_consistency_assess, design_knowledge_query]
  frontend_quality_intelligence:
    capabilities: [quality_audit, runtime_diagnosis]
  seo_intelligence:
    capabilities: [seo_readiness, seo_evidence_collect, seo_graph_query, seo_recommendation_verify]
    orchestrator_entry: seo_evidence_collect
  inspiration_intelligence:
    capabilities: [inspiration_workflow]
  resource_intelligence:
    capabilities: [resource_workflow]
  figma_intelligence:
    capabilities: [figma_integration]
  component_intelligence:
    capabilities: [component_search_plan, component_search, component_select, component_integrate]
    orchestrator_entry: component_integrate

evidence_capability_matrix:
  ui_runtime:
    primary_producers: [browser_observe, browser_verify, browser_diff]
    consumers: [browser_verify, browser_act, form_probe, seo_evidence_collect, quality_audit]
  codebase:
    primary_producers: [codebase_context, framework_profile, component_integrate]
    consumers: [component_search, component_select, seo_evidence_collect]
  design_source:
    primary_producers: [design_review, inspiration_workflow, figma_integration]
    consumers: [design_snapshot, design_consistency_audit]
  design_system:
    primary_producers: [design_snapshot, design_graph_manage, design_consistency_audit]
    consumers: [design_consistency_audit, design_consistency_assess, component_select]
  seo:
    primary_producers: [seo_readiness, seo_evidence_collect, seo_graph_query]
    consumers: [seo_recommendation_verify]
  quality:
    primary_producers: [quality_audit, runtime_diagnosis, browser_diff]
    consumers: [browser_verify]
  assets:
    primary_producers: [inspiration_workflow, resource_workflow, component_search]
    consumers: [component_select, component_integrate]
