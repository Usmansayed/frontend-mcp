schema_version: "1.0"
description: >
  T1 global capability contracts — engineering intent, not individual MCP tools.
  Public API of Coordination Intelligence. Modules integrate by registering here.

design_principles:
  - capabilities_not_modules
  - t1_compact_and_stable
  - tool_evolution_via_r8_only
  - playbooks_reference_t1_only

capabilities:
  - capability_id: environment_probe
    display_name: Probe environment readiness
    tier: T1_global
    kind: probe
    requires:
      evidence: {}
      artifacts: []
      environment: []
    produces:
      evidence:
        ui_runtime: { posture: partial }
      artifacts: []
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: environment_probe
    degradation:
      on_unreachable: stop
    parallel:
      parallelizable: true
      parallel_group: bootstrap_probe
    risk:
      mutates_repo: false
      mcp_ready: true
      blast_radius: low
    replan_triggers:
      on_hard_fail: [TR_DEV_SERVER_DOWN]

  - capability_id: browser_session_manage
    display_name: Manage browser session lifecycle
    tier: T1_global
    kind: session
    requires:
      evidence: {}
      artifacts: []
      environment: [dev_server_reachable]
    produces:
      evidence: {}
      artifacts: [session_id]
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: browser_session_manage
    parallel:
      parallelizable: false
    risk:
      mutates_repo: false
      mcp_ready: true
      blast_radius: low
    replan_triggers:
      on_hard_fail: [TR_SESSION_LOST]

  - capability_id: framework_profile
    display_name: Detect framework and load grounded docs
    tier: T1_global
    kind: collect
    requires:
      evidence: {}
      artifacts: [repo_root]
      environment: []
    produces:
      evidence:
        codebase: { posture: known }
      artifacts: []
    implements:
      - module_id: framework_intelligence
        priority: 1
        tools_ref: framework_profile
    parallel:
      parallelizable: true
      parallel_group: bootstrap_probe
    risk:
      mutates_repo: false
      mcp_ready: true
      blast_radius: low

  - capability_id: browser_observe
    display_name: Observe UI runtime evidence
    tier: T1_global
    kind: observe
    requires:
      evidence: {}
      artifacts: [session_id]
      environment: [dev_server_reachable]
    produces:
      evidence:
        ui_runtime: { posture: known }
      artifacts: [scan_id]
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: browser_observe
    parallel:
      parallelizable: false
      mutex_with: [browser_verify]
    risk:
      mutates_repo: false
      mcp_ready: true
      blast_radius: low

  - capability_id: browser_act
    display_name: Execute in-browser actions or scripts
    tier: T1_global
    kind: mutate
    requires:
      evidence:
        ui_runtime: { min_posture: partial }
      artifacts: [session_id]
      environment: [dev_server_reachable]
    produces:
      evidence:
        ui_runtime: { posture: partial }
      artifacts: [scan_id]
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: browser_act
    parallel:
      parallelizable: false
    risk:
      mutates_remote: true
      mcp_ready: true
      blast_radius: medium

  - capability_id: browser_verify
    display_name: Verify UI against success criteria
    tier: T1_global
    kind: verify
    requires:
      evidence:
        ui_runtime: { min_posture: partial }
      artifacts: [session_id]
      optional_artifacts: [scan_id]
      environment: [dev_server_reachable]
    produces:
      evidence:
        ui_runtime: { posture: verified }
      artifacts: []
      may_set: [scan_id]
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: browser_verify
    degradation:
      on_missing_scan: auto_observe_first
      degraded_posture: partial
    parallel:
      parallelizable: false
      mutex_with: [browser_observe]
    risk:
      mcp_ready: true
      blast_radius: low
    replan_triggers:
      on_verify_fail: [TR_VERIFY_FAIL]
      on_posture_regressed: [TR_VERIFY_FAIL]

  - capability_id: browser_diff
    display_name: Diff UI scans for regression
    tier: T1_global
    kind: verify
    requires:
      evidence: {}
      artifacts: [session_id, scan_id]
      environment: []
    produces:
      evidence:
        quality: { posture: partial }
      artifacts: []
    implements:
      - module_id: visual_browser_intelligence
        priority: 1
        tools_ref: browser_diff
    parallel:
      parallelizable: false
    risk:
      mcp_ready: true
      blast_radius: low

  - capability_id: codebase_context
    display_name: Resolve codebase and route context
    tier: T1_global
    kind: query
    requires:
      evidence: {}
      artifacts: [repo_root]
      environment: []
    produces:
