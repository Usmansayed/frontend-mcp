    risk:
      mcp_ready: true
      blast_radius: medium
    replan_triggers:
      on_hard_fail: [TR_DEGRADED_UPSTREAM]

  - capability_id: design_consistency_audit
    display_name: Audit UI against design graph
    tier: T1_global
    kind: verify
    requires:
      evidence:
        design_system: { min_posture: known }
      artifacts: [scan_id]
      environment: []
    produces:
