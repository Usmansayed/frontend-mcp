    action: health_recover
    notes: probe, then re-issue health, then hand back

relevant_modules: [visual_browser, framework_intelligence, codebase_intelligence]
modules_must_not_execute: [seo_intelligence, figma_intelligence, component_intelligence]
dependencies: [session_id, dev_server_url]

expected_outputs: [first_scan_id]
verification_requirements: [health_ok, default_page_visible]

parent_cluster: null
forest_id: F01
mcp_ready_gap: null
